name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifest-and-overlays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all XML (repo manifest, RRO overlays)
        run: |
          set -e
          find . -name '*.xml' -not -path './.git/*' | while read -r f; do
            python3 -c "import sys, xml.dom.minidom as m; m.parse(sys.argv[1])" "$f"
            echo "OK $f"
          done

      - name: Manifest sanity checks
        run: |
          set -e
          # Every <project> must have name and path; default must pin a revision.
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          root = ET.parse('manifest/default.xml').getroot()
          default = root.find('default')
          assert default is not None and default.get('revision'), 'default revision missing'
          for p in root.findall('project'):
              assert p.get('name') and p.get('path'), f'project missing name/path: {ET.tostring(p)}'
          print('manifest sanity OK')
          EOF

      - name: Makefile fragment syntax
        run: |
          make -f vendor/ossphone/config/common.mk -n -p >/dev/null 2>&1 || {
            # -p with no default target exits non-zero; only fail on parse errors
            make -f vendor/ossphone/config/common.mk -n 2>&1 | grep -q 'missing separator' && exit 1
            true
          }
          echo "common.mk parses"

      - name: Docs link check (internal)
        run: |
          set -e
          grep -rhoE '\]\((docs/[^)#]+|[A-Z]+[A-Za-z.]*\.md)' README.md docs/ | sed 's/](//' | sort -u | while read -r f; do
            [ -f "$f" ] || { echo "broken internal link: $f"; exit 1; }
          done
          echo "internal links OK"
